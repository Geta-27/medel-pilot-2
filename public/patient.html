<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareX - Find Care</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .topbar {
      height: 88px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }
    .brand {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.4px;
    }
    .brand .care { color: #2563eb; }
    .brand .x { color: #22c55e; }
    .topnote {
      color: #6b7280;
      font-size: 15px;
    }
    .hero {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      min-height: 420px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 52px 20px 80px;
    }
    .hero-inner {
      width: 100%;
      max-width: 980px;
      text-align: center;
      color: white;
    }
    .pill {
      display: inline-block;
      background: #f59e0b;
      color: white;
      font-weight: 800;
      font-size: 13px;
      border-radius: 999px;
      padding: 8px 18px;
      margin-bottom: 18px;
    }
    .hero h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.8px;
    }
    .hero p {
      margin: 16px 0 0;
      font-size: 18px;
      opacity: 0.96;
    }
    .search-card {
      width: 100%;
      max-width: 600px;
      margin: 34px auto 0;
      background: white;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.12);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .search-card input,
    .search-card select {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
    }
    .search-btn {
      width: 100%;
      margin-top: 12px;
      border: 0;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .search-btn:hover { background: #1d4ed8; }
    .results-wrap {
      max-width: 980px;
      margin: -38px auto 40px;
      padding: 0 20px;
    }
    .results-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
      padding: 24px;
    }
    .results-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 10px;
    }
    .muted {
      color: #6b7280;
      font-size: 15px;
    }
    .slot {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      margin-top: 14px;
      background: #fff;
    }
    .slot-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .slot h3 {
      margin: 0 0 4px;
      font-size: 20px;
    }
    .clinic {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .meta {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
    }
    .distance {
      display: inline-block;
      margin-top: 8px;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 800;
    }
    .book-btn {
      min-width: 140px;
      border: 0;
      border-radius: 12px;
      background: #2563eb;
      color: #fff;
      padding: 13px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }
    .book-btn:hover { background: #1d4ed8; }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 30px; }
      .slot-top { flex-direction: column; }
      .book-btn { width: 100%; }
      .topbar { padding: 0 16px; }
      .topnote { font-size: 13px; text-align: right; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="care">Care</span><span class="x">X</span></div>
    <div class="topnote">Same-week appointments, available now</div>
  </div>

  <section class="hero">
    <div class="hero-inner">
      <div class="pill">⚡ SLOTS AVAILABLE TODAY</div>
      <h1>See a doctor this week —<br>no waiting, no referral needed</h1>
      <p>Real openings from cancellations and same-day slots. Search by specialty, insurance, and location.</p>

      <div class="search-card">
        <div class="grid">
          <select id="specialty">
            <option value="">Any specialty</option>
            <option value="dermatology">Dermatology</option>
            <option value="psychiatry">Psychiatry</option>
            <option value="gastroenterology">Gastroenterology (GI)</option>
            <option value="neurology">Neurology</option>
            <option value="rheumatology">Rheumatology</option>
            <option value="obgyn">OB/GYN</option>
            <option value="cardiology">Cardiology</option>
            <option value="ophthalmology">Ophthalmology</option>
            <option value="hematology_oncology">Hematology / Oncology</option>
            <option value="endocrinology">Endocrinology</option>
            <option value="neurosurgery">Neurosurgery</option>
            <option value="ent">ENT (Ear, Nose &amp; Throat)</option>
            <option value="orthopedic_surgery">Orthopedic Surgery</option>
            <option value="urology">Urology</option>
            <option value="pulmonology">Pulmonology</option>
            <option value="nephrology">Nephrology</option>
            <option value="allergy_immunology">Allergy &amp; Immunology</option>
            <option value="physical_therapy">Physical Therapy</option>
            <option value="podiatry">Podiatry</option>
            <option value="sleep_medicine">Sleep Medicine</option>
            <option value="primary_care">Primary Care</option>
            <option value="gynecology">Gynecology</option>
            <option value="urgent_care">Urgent Care</option>
          </select>

          <select id="insurance">
            <option value="">Any insurance</option>
            <option value="Aetna">Aetna</option>
            <option value="Blue Cross">Blue Cross</option>
            <option value="Cigna">Cigna</option>
            <option value="United">United</option>
            <option value="Medicare">Medicare</option>
            <option value="Medicaid">Medicaid</option>
            <option value="Self Pay">Self Pay</option>
          </select>

          <input id="location" type="text" placeholder="ZIP code or city" />
        </div>

        <button id="searchBtn" class="search-btn">🔎 Show Available Slots</button>
        <div id="searchMsg" class="muted" style="margin-top:10px;"></div>
      </div>
    </div>
  </section>

  <div class="results-wrap">
    <div class="results-card">
      <div class="results-title">Available Slots</div>
      <div id="results" class="muted">No slots loaded yet.</div>
    </div>
  </div>

  <script>
    function esc(s) {
      return String(s || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function fmt(v) {
      try { return new Date(v).toLocaleString(); }
      catch { return v; }
    }

    document.getElementById("searchBtn").addEventListener("click", async () => {
      const specialty = document.getElementById("specialty").value;
      const insurance = document.getElementById("insurance").value;
      const location = document.getElementById("location").value.trim();
      const msg = document.getElementById("searchMsg");
      const results = document.getElementById("results");

      const qs = new URLSearchParams();
      if (specialty) qs.set("specialty", specialty);
      if (insurance) qs.set("insurance", insurance);
      if (location) qs.set("location", location);

      msg.textContent = "Searching...";
      results.innerHTML = "";

      try {
        const res = await fetch(`/api/marketplace/slots?${qs.toString()}`);
        const data = await res.json();

        if (!data.ok) {
          msg.textContent = "Unable to load slots.";
          return;
        }

        const slots = data.slots || [];
        msg.textContent = `${slots.length} slot(s) found`;

        if (!slots.length) {
          results.innerHTML = `<div class="muted">No matching slots found.</div>`;
          return;
        }

        results.innerHTML = slots.map((slot, i) => `
          <div class="slot">
            <div class="slot-top">
              <div>
                <h3>${esc(slot.providerName)}</h3>
                <div class="clinic">${esc(slot.clinicName)}</div>
                <div class="meta">${esc(slot.specialty)}</div>
                <div class="distance">${esc(slot.distanceMiles)} miles away</div>
                <div class="meta" style="margin-top:10px;">${esc(slot.address)}</div>
                <div class="meta">Accepts: ${esc(slot.insuranceAccepted)}</div>
                <div class="meta">Time: ${esc(fmt(slot.startTime))}</div>
                <div class="meta">Copay estimate: ${esc(slot.copayEstimate || "N/A")}</div>
              </div>
              <div>
                <button class="book-btn" data-i="${i}">Book Now</button>
              </div>
            </div>
          </div>
        `).join("");

        document.querySelectorAll(".book-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const slot = slots[Number(btn.dataset.i)];
            localStorage.setItem("carex_selected_slot", JSON.stringify(slot));
            window.location.href = "/booking.html";
          });
        });
      } catch (e) {
        msg.textContent = "Search failed.";
      }
    });
  </script>
</body>
</html>
